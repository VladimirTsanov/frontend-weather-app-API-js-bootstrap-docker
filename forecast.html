<!DOCTYPE html>

<body>

    <header id="header">

        <nav class="navbar navbar-expand-sm bg-light justify-content-center">

            <a href="/" class="navbar-brand"><img src="" alt="Weather Wise Logo"></a>

            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarContent"
                aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
                <ul class="navbar-nav">

                    <li class="nav-item dropdown">

                            Forecast
                        </a>
                        <div class="dropdown-menu">
                            <a class="dropdown-item" href="/forecast.html?param=daily" name="daily-cast">Daily</a>
                            <a class="dropdown-item" href="/forecast.html?param=hourly" name="hourly-cast">Hourly</a>
                            <a class="dropdown-item" href="/forecast.html?param=monthly" name="monthly-cast">Monthly</a>

                    </li>
                    <li class="nav-item">
                        <a href="/news.html" class="nav-link">Weather News</a>
                    </li>

                <form class="form-inline" action="#">

                        <input class="form-control mr-sm-2" type="text" placeholder="Search City, ZipCode"

                        <button class="btn btn-success" type="submit">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"

                        </div>

    <h1>This is the Weather Forecast page</h1>
